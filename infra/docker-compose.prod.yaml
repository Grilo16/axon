services:
  postgres:
    image: postgres:16-alpine
    container_name: axon-postgres
    restart: unless-stopped
    networks:
      - axon-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: axon-keycloak
    command: start --optimized # Production mode
    restart: unless-stopped
    networks:
      - axon-network
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: auth.yourdomain.com # Change this
      KC_PROXY: edge
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 3G

  axon-server:
    # Use your GHCR image path here
    image: ghcr.io/${GITHUB_USERNAME}/axon-server:latest 
    container_name: axon-server
    restart: unless-stopped
    networks:
      - axon-network
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # ... other envs
    depends_on:
      - postgres
      - keycloak
    deploy:
      resources:
        limits:
          memory: 1500M

  caddy:
    image: caddy:latest
    container_name: axon-proxy
    restart: unless-stopped
    networks:
      - axon-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  axon-network:
    driver: bridge