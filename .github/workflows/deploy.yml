name: Production Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/client-axon/**'
      - 'apps/axon-server/**'
      - 'infra/**'
      - '.github/workflows/**'
      
permissions:
  contents: read
  packages: write


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/client-axon/**'
            backend:
              - 'apps/axon-server/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  build-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Axon Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/client-axon
          file: ./apps/client-axon/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/client-axon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Axon Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/axon-server/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/axon-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [changes, build-frontend, build-backend]
    if: |
      always() && 
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.infra == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /root/axon-project/infra/prod
            # Docker pull only fetches images that actually updated
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f